name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests scripts
      - name: Ruff format check
        run: ruff format --check app tests scripts
      - name: Unit tests
        run: pytest tests -q
