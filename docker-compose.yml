# 一键全家桶：docker compose --profile app up -d
# 本地开发只起基础设施：docker compose up -d mysql redis milvus
services:
  api:
    build: .
    profiles: ["app"]
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus:19530
      PYTHONIOENCODING: utf-8
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/srv/kb-copilot/data/uploads
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    profiles: ["app"]
    command: ["python", "-m", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus:19530
      PYTHONIOENCODING: utf-8
    volumes:
      - upload_data:/srv/kb-copilot/data/uploads
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kb_copilot
      MYSQL_USER: kbcopilot
      MYSQL_PASSWORD: kbcopilot-dev
    ports:
      - "3307:3306"  # 本机 3306 已被系统 MySQL 服务占用
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Milvus standalone 单容器方案（内嵌 etcd + 本地存储，无需独立 etcd/minio）
  # 参考官方 standalone_embed.sh
  milvus:
    image: milvusdb/milvus:v2.4.15
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
      - ./infra/embedEtcd.yaml:/milvus/configs/embedEtcd.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  mysql_data:
  milvus_data:
  upload_data:
